name: deploy

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed

concurrency:
  # A completed PR build also triggers this workflow before the deploy job is
  # skipped. Keep those runs out of the production queue so they cannot cancel
  # a newer main deployment.
  group: production-deploy-${{ github.event.workflow_run.event }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check deploy configuration
        id: deploy_config
        run: |
          if [[ -n "$CLOUDFLARE_API_TOKEN" && -n "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when Cloudflare secrets are missing
        if: steps.deploy_config.outputs.configured != 'true'
        run: echo "Cloudflare deploy secrets are not configured; skipping deploy."

      - name: Checkout
        if: steps.deploy_config.outputs.configured == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        if: steps.deploy_config.outputs.configured == 'true'
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        if: steps.deploy_config.outputs.configured == 'true'
        run: npm ci

      - name: Deploy to Cloudflare Workers
        if: steps.deploy_config.outputs.configured == 'true'
        run: npm run deploy
        env:
          KOTONA_BUILD_REVISION: ${{ github.event.workflow_run.head_sha }}
