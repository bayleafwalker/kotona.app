name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm run audit:dependencies

      - name: Check formatting
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Project freshness policy
        run: npm run check:content-freshness

      - name: Type, content, and editorial-role checks
        run: npm run check

      - name: Build
        run: npm run build

      - name: Worker integration smoke test
        run: npm run test:worker

      - name: Public-corpus retrieval evaluation
        run: npm run test:retrieval

      - name: External link check
        run: npm run check:links
